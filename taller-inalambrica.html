function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function pickRandom(arr, n) {
    const shuffled = shuffleArray([...arr]);
    return shuffled.slice(0, n);
}

function generateQuiz() {
    const mcPerSection = { 1: 5, 3: 3, 4: 2 };
    const openPerSection = { 2: 3, 3: 1, 4: 2 };

    const mcBySection = {};
    const openBySection = {};

    questionPool.forEach(q => {
        if (!mcBySection[q.section]) mcBySection[q.section] = [];
        mcBySection[q.section].push(q);
    });
    openPool.forEach(q => {
        if (!openBySection[q.section]) openBySection[q.section] = [];
        openBySection[q.section].push(q);
    });

    let selectedMC = [];
    let selectedOpen = [];

    Object.keys(mcPerSection).forEach(s => {
        const section = parseInt(s);
        const pool = mcBySection[section] || [];
        const needed = Math.min(mcPerSection[s], pool.length);
        selectedMC.push(...pickRandom(pool, needed));
    });

    Object.keys(openPerSection).forEach(s => {
        const section = parseInt(s);
        const pool = openBySection[section] || [];
        const needed = Math.min(openPerSection[s], pool.length);
        selectedOpen.push(...pickRandom(pool, needed));
    });

    const allQuestions = [];
    let globalIndex = 0;

    const sections = [1, 2, 3, 4];
    sections.forEach(s => {
        const mcHere = selectedMC.filter(q => q.section === s);
        const openHere = selectedOpen.filter(q => q.section === s);
        if (mcHere.length > 0 || openHere.length > 0) {
            allQuestions.push({ type: "sectionHeader", title: sectionTitles[s] });
        }

        shuffleArray(mcHere);
        mcHere.forEach(q => {
            globalIndex++;
            const shuffledOpts = q.opts.map((text, idx) => ({ text, origIdx: idx }));
            shuffleArray(shuffledOpts);
            allQuestions.push({
                type: "mc",
                index: globalIndex,
                question: q.q,
                options: shuffledOpts.map((o, i) => ({ ...o, displayIdx: i })),
                correctOrigIdx: q.correct
            });
        });

        shuffleArray(openHere);
        openHere.forEach(q => {
            globalIndex++;
            allQuestions.push({
                type: "open",
                index: globalIndex,
                question: q.q
            });
        });
    });

    return allQuestions;
}

function renderQuiz(quiz) {
    const container = document.getElementById('quizContainer');
    container.innerHTML = '';

    let mcCounter = 0;

    quiz.forEach(item => {
        if (item.type === "sectionHeader") {
            const div = document.createElement('div');
            div.className = 'section';
            const h2 = document.createElement('h2');
            h2.textContent = item.title;

            if (item.title.startsWith("3.")) {
                const p = document.createElement('p');
                p.style.marginBottom = '12px';
                p.textContent = 'Usa la siguiente tabla comparativa del material de lectura para responder las preguntas:';
                div.appendChild(h2);
                div.appendChild(p);
                div.appendChild(createTable());
                container.appendChild(div);
            } else {
                div.appendChild(h2);
                container.appendChild(div);
            }
            return;
        }

        if (item.type === "mc") {
            mcCounter++;
            const div = document.createElement('div');
            div.className = 'question';
            div.dataset.mcIndex = mcCounter - 1;

            const p = document.createElement('p');
            p.textContent = mcCounter + '. ' + item.question;
            div.appendChild(p);

            item.options.forEach((opt, idx) => {
                const label = document.createElement('label');
                const input = document.createElement('input');
                input.type = 'radio';
                input.name = 'mc_' + mcCounter;
                input.value = idx;
                label.appendChild(input);
                label.appendChild(document.createTextNode(' ' + opt.text));
                div.appendChild(label);
            });

            container.appendChild(div);
        } else if (item.type === "open") {
            const div = document.createElement('div');
            div.className = 'question';

            const label = document.createElement('label');
            label.className = 'open-label';
            label.textContent = item.index + '. ' + item.question;
            div.appendChild(label);

            const textarea = document.createElement('textarea');
            textarea.rows = 4;
            textarea.className = 'open-q';
            div.appendChild(textarea);

            container.appendChild(div);
        }
    });
}

            <tr><td><strong>Tasa de datos</strong></td><td>Lenta (0.3-50 kbps)</td><td>Alta (hasta 1 Gbps)</td><td>Moderada (20-250 kbps)</td><td>Lenta-moderada (hasta 2 Mbps)</td><td>Alta (5G: 100 Mbps-20 Gbps)</td><td>Baja (10-424 kbit/s)</td></tr>
            <tr><td><strong>Consumo de energía</strong></td><td>Muy eficiente</td><td>Alto</td><td>Bajo</td><td>Bajo a moderado</td><td>Moderado a alto</td><td>Muy bajo</td></tr>
            <tr><td><strong>Costo</strong></td><td>Asequible</td><td>Moderado a elevado</td><td>Bajo</td><td>Bajo</td><td>Alto</td><td>Bajo (pasivas)</td></tr>
            <tr><td><strong>Escalabilidad</strong></td><td>Altamente escalable (miles)</td><td>Limitada</td><td>Moderada</td><td>Limitada</td><td>Altamente escalable (millones)</td><td>Altamente escalable</td></tr>
        </tbody>
    </table>`;
    return wrap;
}

function loadNewQuiz() {
    currentQuiz = generateQuiz();
    renderQuiz(currentQuiz);
    document.getElementById('result').classList.remove('show');
}

document.getElementById('submitBtn').addEventListener('click', function() {
    let total = 0, correctas = 0;
    const mcQuestions = currentQuiz.filter(q => q.type === "mc");

    mcQuestions.forEach((q, idx) => {
        total++;
        const divs = document.querySelectorAll('.question[data-mc-index]');
        let selectedDiv = null;
        divs.forEach(d => {
            if (parseInt(d.dataset.mcIndex) === idx) selectedDiv = d;
        });
        if (selectedDiv) {
            const selected = selectedDiv.querySelector('input[type="radio"]:checked');
            if (selected) {
                const chosenIdx = parseInt(selected.value);
                if (q.options[chosenIdx].origIdx === q.correctOrigIdx) {
                    correctas++;
                    const p = selectedDiv.querySelector('p');
                    if (!p.querySelector('.correct-mark')) {
                        const span = document.createElement('span');
                        span.className = 'correct-mark';
                        span.textContent = ' ✓';
                        p.appendChild(span);
                    }
                } else {
                    const p = selectedDiv.querySelector('p');
                    if (!p.querySelector('.wrong-mark')) {
                        const span = document.createElement('span');
                        span.className = 'wrong-mark';
                        span.textContent = ' ✗';
                        p.appendChild(span);
                    }
                    q.options.forEach((opt, i) => {
                        if (opt.origIdx === q.correctOrigIdx) {
                            const labels = selectedDiv.querySelectorAll('label');
                            labels.forEach(l => {
                                if (l.querySelector('input') && parseInt(l.querySelector('input').value) === i) {
                                    const corrSpan = document.createElement('span');
                                    corrSpan.style.cssText = 'color:#38a169;font-weight:bold;margin-left:4px';
                                    corrSpan.textContent = ' (correcta)';
                                    l.appendChild(corrSpan);
                                }
                            });
                        }
                    });
                }
            } else {
                const p = selectedDiv.querySelector('p');
                if (!p.querySelector('.wrong-mark')) {
                    const span = document.createElement('span');
                    span.className = 'wrong-mark';
                    span.textContent = ' ✗';
                    p.appendChild(span);
                }
            }
        }
    });

    const resultado = document.getElementById('result');
    resultado.classList.add('show');
    const pct = Math.round((correctas / total) * 100);

    if (pct >= 60) {
        resultado.className = 'result-box pass show';
        resultado.innerHTML = `<strong>¡Bien hecho!</strong> Obtuviste ${correctas} de ${total} respuestas correctas (${pct}%). Revisa las preguntas de desarrollo con tu docente.`;
    } else {
        resultado.className = 'result-box fail show';
        resultado.innerHTML = `<strong>Puedes mejorar.</strong> Obtuviste ${correctas} de ${total} respuestas correctas (${pct}%). Te sugerimos releer el material e intentar de nuevo.`;
    }

    window.scrollTo({ top: document.getElementById('result').offsetTop - 20, behavior: 'smooth' });
});

document.getElementById('retryBtn').addEventListener('click', function() {
    loadNewQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
});

loadNewQuiz();
</script>
</body>
</html>
